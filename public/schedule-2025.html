<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemba Academy Match Schedule</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .portal-bg { background-color: #0d121c; }
        .card-bg { background-color: #1F2937; }
        .accent-color { color: #84cc16; } 
        .result-win { background-color: #166534; } /* Dark Green */
        .result-upcoming { background-color: #374151; } /* Dark Gray */
        .result-trial { background-color: #9d174d; } /* Dark Pink/Crimson */
        .match-card { transition: transform 0.2s; }
        .match-card:hover { transform: translateY(-3px); }
        .match-event-row { border-bottom: 1px dashed rgba(255, 255, 255, 0.1); }
    </style>
    <script type="module">
        const MATCH_JSON_PATH = 'match_data.json';
        const scheduleListEl = document.getElementById('schedule-list');
        const loaderEl = document.getElementById('loader');
        const statusMessageEl = document.getElementById('status-message');

        const loadSchedule = async () => {
            try {
                const response = await fetch(MATCH_JSON_PATH);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                renderSchedule(data.schedule || []);
                statusMessageEl.textContent = 'Schedule loaded successfully.';
            } catch (error) {
                console.error("Error loading schedule:", error);
                statusMessageEl.textContent = `FATAL ERROR: Could not load match data from ${MATCH_JSON_PATH}.`;
            } finally {
                loaderEl.classList.add('hidden');
            }
        };

        const renderSchedule = (schedule) => {
            scheduleListEl.innerHTML = '';
            
            schedule.forEach(match => {
                let cardClass, headerContent, resultDetails = '';
                
                if (match.type === 'RESULT') {
                    cardClass = match.result.winner === 'LA' ? 'result-win' : 'bg-red-900';
                    headerContent = `
                        <div class="flex justify-between items-center text-xl font-bold">
                            <span>Final: Lemba Academy (${match.result.score_la})</span>
                            <span class="text-white">vs ${match.opponent} (${match.result.score_opp})</span>
                        </div>
                        <div class="text-sm text-lime-300 font-semibold mt-1">WIN - ${match.date}</div>
                    `;
                    resultDetails = `
                        <h4 class="text-lg font-bold mt-4 mb-2 text-lime-300 border-b border-lime-600/50 pb-1">Goal Summary (LA)</h4>
                        <div class="space-y-1 text-sm">
                            ${match.result.details.map(detail => `
                                <div class="match-event-row flex justify-between py-1">
                                    <span class="font-bold w-12 text-gray-300">${detail.time}</span>
                                    <span class="w-32">${detail.scorer === 'DMV Starz FC' ? 'Opponent Goal' : detail.scorer}</span>
                                    <span class="text-gray-400 text-right italic flex-grow">${detail.notes ? `(${detail.notes})` : ''}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (match.type === 'UPCOMING') {
                    cardClass = 'result-upcoming';
                    headerContent = `
                        <div class="flex justify-between items-center text-xl font-bold">
                            <span>Lemba Academy vs ${match.opponent}</span>
                        </div>
                        <div class="text-sm text-gray-300 font-semibold mt-1">UPCOMING: ${match.date} @ ${match.time}</div>
                    `;
                } else if (match.type === 'TRIAL') {
                    cardClass = 'result-trial';
                    headerContent = `
                        <div class="flex justify-between items-center text-xl font-bold">
                            <span>${match.opponent}</span>
                        </div>
                        <div class="text-sm text-pink-300 font-semibold mt-1">PLAYER TRIAL: ${match.date} @ ${match.time}</div>
                    `;
                }

                const cardHtml = `
                    <div class="match-card p-6 rounded-xl shadow-2xl ${cardClass} border border-gray-700/50">
                        ${headerContent}
                        <p class="text-sm text-gray-400 mt-2">Location: ${match.location}</p>
                        ${resultDetails}
                    </div>
                `;
                scheduleListEl.innerHTML += cardHtml;
            });
        };

        window.onload = loadSchedule;
    </script>
</head>
<body class="portal-bg min-h-screen text-gray-100">

    <div id="loader" class="fixed inset-0 portal-bg flex flex-col justify-center items-center z-50">
        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-lime-500"></div>
        <p class="mt-4 text-lime-400">Loading Schedule...</p>
    </div>

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <header class="pb-4 border-b border-lime-600/50 mb-8">
            <h1 class="text-4xl font-extrabold text-white tracking-tight accent-color">Match Schedule</h1>
            <p class="text-lg text-gray-400 mt-1">Lemba Academy Fixtures & Results (December 2025)</p>
        </header>

        <main>
            <div id="schedule-list" class="space-y-6">
                <!-- Match cards will be injected here -->
            </div>
        </main>
        
        <footer class="mt-8 text-center text-sm p-3 rounded-lg" id="footer-status">
            <p id="status-message" class="font-semibold">Loading data...</p>
        </footer>
    </div>
</body>
</html>
