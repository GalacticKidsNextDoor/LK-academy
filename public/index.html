<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemba Kongo Academy - MPC Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 font-sans selection:bg-red-500 selection:text-white">

  <!-- Added z-0 to establish base stacking context -->
  <div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden z-0">
    
    <!-- Global Brightness Overlay -->
    <!-- Changed z-50 to z-0 so it dims the background but sits BEHIND the MPC body -->
    <div id="brightness-overlay" class="fixed inset-0 pointer-events-none z-0 transition-opacity duration-200" style="background-color: black; opacity: 0; pointer-events: none;"></div>

    <!-- Hidden Audio Element -->
    <audio id="bgm-audio" src="https://actions.google.com/sounds/v1/sports/stadium_crowd.ogg" loop></audio>

    <!-- Main MPC Hardware Body -->
    <!-- Added z-10 so the entire machine sits above the global background darkness -->
    <div class="relative w-full max-w-5xl bg-gradient-to-br from-zinc-700 via-zinc-800 to-zinc-900 p-6 md:p-10 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8),inset_0_2px_0_rgba(255,255,255,0.1)] border border-zinc-900 flex flex-col gap-10 transform perspective-1000 z-10">
      
      <!-- Inner MPC Darkness Overlay -->
      <!-- Added z-40 to dim all the hardware elements inside the MPC body -->
      <div id="mpc-overlay" class="absolute inset-0 pointer-events-none z-40 rounded-2xl transition-opacity duration-200" style="background-color: black; opacity: 0;"></div>

      <!-- Branding / Top Bar -->
      <div class="flex justify-between items-center border-b border-zinc-600 pb-4">
        <div class="flex items-center gap-4">
          <h1 class="text-3xl md:text-4xl font-black text-red-600 tracking-tighter italic shadow-sm drop-shadow-md">
            LEMBA KONGO
          </h1>
          <span class="text-zinc-400 font-bold tracking-widest text-xs md:text-sm border border-zinc-500 px-2 py-1 rounded">
            ACADEMY + STUDIO
          </span>
        </div>
        <div class="hidden md:flex gap-2">
          <div class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse"></div>
          <div class="w-3 h-3 rounded-full bg-zinc-600"></div>
          <div class="w-3 h-3 rounded-full bg-zinc-600"></div>
        </div>
      </div>

      <!-- Top Section: Screen & Sliders -->
      <div class="flex flex-col md:flex-row gap-8 items-start">
        
        <!-- Q-Link Sliders (Left) -->
        <div class="flex flex-row md:flex-col gap-6 bg-zinc-900 p-4 rounded-xl border-t border-zinc-700 shadow-inner w-full md:w-auto items-center">
          <div class="text-zinc-500 text-xs font-bold tracking-widest uppercase mb-2">Q-Link</div>
          
          <!-- Brightness Slider -->
          <div class="flex flex-col items-center gap-2">
            <svg class="text-zinc-400 z-10" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            
            <!-- Fixed Slider: Horizontal input rotated -90deg for perfect cross-browser compatibility -->
            <!-- Note: Elevated slider slightly (z-50) so users can always find it to turn lights back on -->
            <div class="w-8 h-32 flex items-center justify-center my-2 relative z-50">
              <input 
                id="brightness-slider"
                type="range" 
                min="20" 
                max="100" 
                value="100"
                class="w-32 h-3 appearance-none bg-zinc-700 rounded-full outline-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-6 [&::-webkit-slider-thumb]:h-6 [&::-webkit-slider-thumb]:bg-red-500 [&::-webkit-slider-thumb]:rounded-sm [&::-webkit-slider-thumb]:cursor-pointer cursor-pointer shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] -rotate-90 absolute"
              />
            </div>

            <span class="text-[10px] text-zinc-500 font-bold uppercase mt-1 text-center">Screen<br/>Dim</span>
          </div>
        </div>

        <!-- Main Display Screen (Center) -->
        <!-- Added z-50 to pop THIS container over the mpc-overlay internal shadow! -->
        <div class="flex-1 w-full bg-black rounded-lg p-2 md:p-4 shadow-[inset_0_0_20px_rgba(0,0,0,1)] border-4 border-zinc-900 relative group z-50">
          <div class="text-red-500 text-[10px] font-mono mb-2 flex justify-between px-1 z-10 relative">
            <span>SEQ: 01   TRK: 01</span>
            <span id="gallery-counter">1 / 6</span>
          </div>
          
          <div class="relative aspect-video w-full overflow-hidden rounded border border-zinc-800 bg-zinc-950" id="gallery-container">
            <!-- Images are injected here via JS -->
            
            <img id="img-0" src="./media/img/lions-united-0.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-100 scale-100" alt="Gallery 1">
            <img id="img-1" src="./media/img/lions-united-1.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-0 scale-105" alt="Gallery 2">
            <img id="img-2" src="./media/img/lions-united-2.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-0 scale-105" alt="Gallery 3">
            <img id="img-3" src="./media/img/lions-united-3.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-0 scale-105" alt="Gallery 4">
            <img id="img-4" src="./media/img/lions-united-4.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-0 scale-105" alt="Gallery 5">
            <img id="img-5" src="./media/img/lions-united-5.png" class="gallery-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out opacity-0 scale-105" alt="Gallery 6">

            <!-- Scanline / Screen Glare Overlay -->
            <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.2)_50%)] bg-[length:100%_4px] opacity-30 mix-blend-overlay"></div>
            <div class="absolute inset-0 pointer-events-none bg-gradient-to-tr from-transparent via-white/5 to-white/10"></div>
          </div>
        </div>

        <!-- Right Data Wheel / Dials -->
        <div class="hidden lg:flex flex-col gap-8 items-center justify-center p-4">
          <div class="relative w-24 h-24 rounded-full bg-zinc-900 border-4 border-zinc-700 shadow-[0_5px_15px_rgba(0,0,0,0.5),inset_0_2px_5px_rgba(255,255,255,0.1)] flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
            <div class="w-16 h-16 rounded-full bg-zinc-800 shadow-inner flex items-center justify-center">
               <div class="w-2 h-2 bg-red-500 rounded-full absolute top-2"></div>
            </div>
          </div>
          <div class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest text-center">Data Dial<br/>(Visual)</div>
        </div>
      </div>

      <!-- Bottom Section: Pads & Transport -->
      <div class="flex flex-col md:flex-row items-center md:items-end w-full gap-6 mt-4 relative">
        
        <!-- Layout Fix: Left spacer balances the right-aligned transport controls to perfectly center the pad grid -->
        <div class="hidden md:block flex-1"></div>

        <!-- 3x3 Pad Grid (Centered in Layout) -->
        <div class="bg-zinc-900/50 p-6 rounded-xl border border-zinc-800 shadow-inner flex-none mx-auto md:mx-0">
           <div class="text-zinc-500 text-xs font-bold tracking-widest uppercase mb-4 text-center md:text-left">Nav / Triggers</div>
           <div class="grid grid-cols-3 gap-3 md:gap-4" id="pad-grid">
            <!-- Pads injected via JS to keep HTML clean -->
          </div>
        </div>

        <!-- Transport Controls (Right aligned on desktop, full width on mobile) -->
        <div class="flex-1 flex md:justify-end w-full">
          <div class="flex flex-col gap-4 bg-zinc-800/80 p-6 rounded-xl border-t border-l border-zinc-700 w-full md:w-auto">
             <div class="text-zinc-400 text-[10px] font-bold tracking-widest uppercase">Transport (BGM)</div>
             <div class="flex gap-4">
                <!-- Play Button -->
                <button 
                  id="btn-play"
                  class="w-16 h-12 rounded bg-zinc-300 text-zinc-800 hover:bg-white flex items-center justify-center shadow-[0_4px_0_rgb(113,113,122)] active:shadow-none active:translate-y-1 transition-all"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                </button>
                
                <!-- Stop Button -->
                <button 
                  id="btn-stop"
                  class="w-16 h-12 rounded bg-red-500 text-white shadow-[0_2px_0_rgb(153,27,27)] flex items-center justify-center active:shadow-none active:translate-y-1 transition-all"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                </button>
             </div>
             
             <!-- Audio Status Indicator -->
             <div class="mt-2 flex items-center gap-2 text-xs font-mono text-zinc-500" id="audio-status">
               <svg id="icon-vol-off" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
               <svg id="icon-vol-on" class="hidden text-green-500 animate-pulse" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
               <span id="audio-status-text">BGM: STOPPED</span>
             </div>
          </div>
        </div>

      </div>
      
      <!-- Bottom Hardware Screws/Details -->
      <div class="absolute bottom-4 left-4 w-3 h-3 rounded-full bg-zinc-900 shadow-inner border border-zinc-700"></div>
      <div class="absolute bottom-4 right-4 w-3 h-3 rounded-full bg-zinc-900 shadow-inner border border-zinc-700"></div>
      <div class="absolute top-4 left-4 w-3 h-3 rounded-full bg-zinc-900 shadow-inner border border-zinc-700"></div>
      <div class="absolute top-4 right-4 w-3 h-3 rounded-full bg-zinc-900 shadow-inner border border-zinc-700"></div>
    </div>
  </div>

  <script>
    // --- State Variables ---
    let currentImage = 0;
    const totalImages = 6;
    let brightness = 100;
    let isPlaying = false;

    // --- DOM Elements ---
    const brightnessSlider = document.getElementById('brightness-slider');
    const brightnessOverlay = document.getElementById('brightness-overlay');
    const mpcOverlay = document.getElementById('mpc-overlay'); // New Inner Overlay
    const galleryCounter = document.getElementById('gallery-counter');
    const audioEl = document.getElementById('bgm-audio');
    
    const btnPlay = document.getElementById('btn-play');
    const btnStop = document.getElementById('btn-stop');
    const iconVolOff = document.getElementById('icon-vol-off');
    const iconVolOn = document.getElementById('icon-vol-on');
    const audioStatusText = document.getElementById('audio-status-text');
    const padGrid = document.getElementById('pad-grid');

    // --- Data ---
    const padsData = [
      { id: 0, label: "Academy", type: "nav", action: () => open("./academy.html", "_blank") },
      { id: 1, label: "History", type: "nav", action: () => open("./history.html", "_blank") },
      { id: 2, label: "First Team", type: "nav", action: () => open("./roster.html", "_blank") },
      { id: 3, label: "Shop", type: "nav", action: () => open("./shop.html", "_blank") },
      { id: 4, label: "Pad 5", type: "empty", action: () => console.log("Pad 5 triggered - Ready for artistic input") },
      { id: 5, label: "Pad 6", type: "empty", action: () => console.log("Pad 6 triggered - Ready for artistic input") },
      { id: 6, label: "Pad 7", type: "empty", action: () => console.log("Pad 7 triggered - Ready for artistic input") },
      { id: 7, label: "Pad 8", type: "empty", action: () => console.log("Pad 8 triggered - Ready for artistic input") },
      { id: 8, label: "Pad 9", type: "empty", action: () => console.log("Pad 9 triggered - Ready for artistic input") },
    ];

    // --- Initialization & Render Logic ---

    // Render Pads
    function renderPads() {
      padsData.forEach((pad) => {
        const btn = document.createElement('button');
        const textColor = pad.id < 4 ? 'text-zinc-900' : 'text-zinc-500';
        
        btn.className = `
          relative w-20 h-20 md:w-28 md:h-28 rounded-md flex flex-col items-center justify-center text-xs md:text-sm font-bold uppercase tracking-wider select-none outline-none transition-all duration-75
          bg-zinc-400 -translate-y-1 shadow-[0_6px_0_rgb(82,82,91),inset_0_2px_0_rgba(255,255,255,0.6)] hover:bg-zinc-300 ${textColor}
        `;
        
        btn.innerHTML = `<span class="z-10 pointer-events-none">${pad.label}</span>
                         <div class="pad-glow absolute inset-0 bg-red-500/20 rounded-md blur-md z-0 hidden pointer-events-none"></div>`;
        
        btn.addEventListener('click', () => {
          // Visual Depression
          btn.classList.replace('bg-zinc-400', 'bg-zinc-300');
          btn.classList.replace('-translate-y-1', 'translate-y-1');
          btn.classList.replace('shadow-[0_6px_0_rgb(82,82,91),inset_0_2px_0_rgba(255,255,255,0.6)]', 'shadow-[0_0px_0_rgb(82,82,91),inset_0_2px_10px_rgba(0,0,0,0.3)]');
          btn.querySelector('.pad-glow').classList.remove('hidden');

          // Trigger Action
          pad.action();

          // Reset Visuals after 150ms
          setTimeout(() => {
            btn.classList.replace('bg-zinc-300', 'bg-zinc-400');
            btn.classList.replace('translate-y-1', '-translate-y-1');
            btn.classList.replace('shadow-[0_0px_0_rgb(82,82,91),inset_0_2px_10px_rgba(0,0,0,0.3)]', 'shadow-[0_6px_0_rgb(82,82,91),inset_0_2px_0_rgba(255,255,255,0.6)]');
            btn.querySelector('.pad-glow').classList.add('hidden');
          }, 150);
        });

        padGrid.appendChild(btn);
      });
    }

    // --- Handlers & Updates ---

    // Update Slider Brightness
    brightnessSlider.addEventListener('input', (e) => {
      brightness = e.target.value;
      const opacityLevel = 1 - (brightness / 100);
      
      // Update both the background AND the MPC casing shadow
      brightnessOverlay.style.opacity = opacityLevel;
      mpcOverlay.style.opacity = opacityLevel;
    });

    // Gallery Rotation Logic
    function updateGallery() {
      const prevImage = currentImage;
      currentImage = (currentImage + 1) % totalImages;
      
      const prevImgEl = document.getElementById(`img-${prevImage}`);
      const nextImgEl = document.getElementById(`img-${currentImage}`);

      prevImgEl.classList.remove('opacity-100', 'scale-100');
      prevImgEl.classList.add('opacity-0', 'scale-105');

      nextImgEl.classList.remove('opacity-0', 'scale-105');
      nextImgEl.classList.add('opacity-100', 'scale-100');

      galleryCounter.innerText = `${currentImage + 1} / ${totalImages}`;
    }

    // Set Gallery Interval (every 10s)
    setInterval(updateGallery, 10000);

    // Audio Controls
    function updateAudioUI() {
      if (isPlaying) {
        // Play btn active styling
        btnPlay.classList.replace('bg-zinc-300', 'bg-red-500');
        btnPlay.classList.replace('text-zinc-800', 'text-white');
        btnPlay.classList.replace('shadow-[0_4px_0_rgb(113,113,122)]', 'shadow-[0_2px_0_rgb(153,27,27)]');
        btnPlay.classList.remove('hover:bg-white');
        
        // Stop btn inactive styling
        btnStop.classList.replace('bg-red-500', 'bg-zinc-300');
        btnStop.classList.replace('text-white', 'text-zinc-800');
        btnStop.classList.replace('shadow-[0_2px_0_rgb(153,27,27)]', 'shadow-[0_4px_0_rgb(113,113,122)]');
        btnStop.classList.add('hover:bg-white');

        iconVolOff.classList.add('hidden');
        iconVolOn.classList.remove('hidden');
        audioStatusText.innerText = 'BGM: PLAYING';
        
        audioEl.play().catch(e => console.log("Audio play prevented by browser policy:", e));
      } else {
        // Play btn inactive styling
        btnPlay.classList.replace('bg-red-500', 'bg-zinc-300');
        btnPlay.classList.replace('text-white', 'text-zinc-800');
        btnPlay.classList.replace('shadow-[0_2px_0_rgb(153,27,27)]', 'shadow-[0_4px_0_rgb(113,113,122)]');
        btnPlay.classList.add('hover:bg-white');

        // Stop btn active styling
        btnStop.classList.replace('bg-zinc-300', 'bg-red-500');
        btnStop.classList.replace('text-zinc-800', 'text-white');
        btnStop.classList.replace('shadow-[0_4px_0_rgb(113,113,122)]', 'shadow-[0_2px_0_rgb(153,27,27)]');
        btnStop.classList.remove('hover:bg-white');

        iconVolOn.classList.add('hidden');
        iconVolOff.classList.remove('hidden');
        audioStatusText.innerText = 'BGM: STOPPED';

        audioEl.pause();
      }
    }

    btnPlay.addEventListener('click', () => {
      isPlaying = true;
      updateAudioUI();
    });

    btnStop.addEventListener('click', () => {
      isPlaying = false;
      updateAudioUI();
    });

    // Boot Up
    renderPads();
  </script>
</body>
</html>
