      function toggleItemPreviewContainer(item){
        let currentNFT = item;
        if(nftPreviewIsVisible){
          nftPreviewContainer.style.opacity = 0;
          setTimeout(function(){
            nftPreviewContainer.style.display = "none";
          }, 505);
          nftPreviewIsVisible = false;
        }
        else{
          nftPreviewContainer.style.display = "block";
          document.getElementById("preview-item-title-container").textContent = Inventory[currentNFT].title;
          document.getElementById("preview-item-author-container").innerHTML = `<a target="_blank" href="${Inventory[currentNFT].link}" style="text-decoration: none; text-transform: uppercase;">${Inventory[currentNFT].author}</span>`;
          document.getElementById("preview-item-price-container").textContent = Inventory[currentNFT].price;
          document.getElementById("preview-item-description-container").textContent = Inventory[currentNFT].description;
          document.getElementById("preview-item-visual-container").style.backgroundImage = `url(${Inventory[currentNFT].preview})`;
          setTimeout(function(){
            nftPreviewContainer.style.opacity = 1.0;
          }, 50);
          nftPreviewIsVisible = true;
        }
      }


      function toggleMenuContainer(){
        if(menuIsVisible){
          document.getElementById("main-menu-container").style.opacity = 0;
          document.getElementById("main-menu-container").style.height = 0;
          setTimeout(function(){
              document.getElementById("main-menu-container").style.display = "none";
          }, 505);
          menuIsVisible = false;
        }
        else{
          document.getElementById("main-menu-container").style.display = "block";
          setTimeout(function(){
            document.getElementById("main-menu-container").style.opacity = 1.0;
            document.getElementById("main-menu-container").style.height = "100%";
          }, 50);
          menuIsVisible = true;
        }
      }

        console.log("LEMBA - KONGO \n Cultural Outlet & Travel Rep \n DIA v. 0.1.0 \n by Patrice-Morgan");

        document.getElementById("go-home-button-container").addEventListener("click", function(){

        });

        document.getElementById("join-lyoko-button-container").addEventListener("click", function(){
          toggleMenuContainer();
        });

        document.getElementById("return-to-store-button-container").addEventListener("click", function(){
          toggleItemPreviewContainer();
        });

        //let nftButtons = document.getElementsByClassName("view-nft-button-container");

        for(var i=0; i<Inventory.length; i++){
          (function(){
            let currentNFT = i;

            let nftContainer = document.createElement("div");
            nftContainer.setAttribute("id", `nft-${currentNFT}-container`);
            nftContainer.classList.add("nft-container");

            let nftVisualContainer = document.createElement("div");
            nftVisualContainer.setAttribute("id", `nft-${currentNFT}-visual-container`);
            nftVisualContainer.classList.add("nft-visual-container");

            let nftMetaContainer = document.createElement("div");
            nftMetaContainer.setAttribute("id", `nft-${currentNFT}-meta-container`);
            nftMetaContainer.classList.add("nft-meta-container");

            let nftTitleContainer = document.createElement("div");
            nftTitleContainer.setAttribute("id", `nft-${currentNFT}-title-container`);
            nftTitleContainer.classList.add("nft-title-container");

            let nftAuthorContainer = document.createElement("div");
            nftAuthorContainer.setAttribute("id", `nft-${currentNFT}-author-container`);
            nftAuthorContainer.classList.add("nft-author-container");

            let nftValueContainer = document.createElement("div");
            nftValueContainer.setAttribute("id", `nft-${currentNFT}-value-container`);
            nftValueContainer.classList.add("nft-value-container");

            let nftViewContainer = document.createElement("input");
            nftViewContainer.setAttribute("id", `view-nft-${currentNFT}-button-container`);
            nftViewContainer.classList.add("view-nft-button-container");
            nftViewContainer.setAttribute("type", "button");
            nftViewContainer.setAttribute("value", "view");

            let nftPurchaseContainer = document.createElement("input");
            nftPurchaseContainer.setAttribute("id", `buy-nft-${currentNFT}-button-container`);
            nftPurchaseContainer.classList.add("buy-nft-button-container");
            nftPurchaseContainer.setAttribute("type", "button");
            nftPurchaseContainer.setAttribute("value", "buy");


            nftTitleContainer.textContent = Inventory[currentNFT].title;
            nftAuthorContainer.textContent = Inventory[currentNFT].author;
            nftValueContainer.textContent = Inventory[currentNFT].price;
            nftVisualContainer.style.backgroundImage = `url(${Inventory[currentNFT].preview})`;
            if(i>5){
              nftVisualContainer.setAttribute("loading", "lazy");
            }
            nftViewContainer.addEventListener("click", function(){
              toggleItemPreviewContainer(currentNFT);
            });

            document.getElementById("examples-container").append(nftContainer);
            nftContainer.append(nftVisualContainer);
            nftContainer.append(nftTitleContainer);
            nftContainer.append(nftAuthorContainer);
            nftContainer.append(nftValueContainer);
            nftContainer.append(nftViewContainer);
            nftContainer.append(nftPurchaseContainer);

          })();
