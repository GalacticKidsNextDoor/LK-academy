<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemba-Kongo Academy - League Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        lemba: {
                            green: '#84cc16', // Vibrant lime green from the screenshots
                            dark: '#0f172a',
                            black: '#0a0a0a',
                            panel: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #000; color: #000; font-weight: 600; }
        .tab-inactive { color: #6b7280; font-weight: 500; }
        .tab-inactive:hover { color: #374151; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Navigation -->
    <div class="bg-lemba-black px-6 py-5 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-lemba-green text-black flex items-center justify-center font-bold text-lg">
                LK
            </div>
            <h2 class="text-white text-2xl font-bold tracking-tight uppercase">National Capital Academy League</h2>
        </div>
        <div class="text-white text-sm font-medium space-x-6 hidden sm:block">
            <a href="#" class="hover:text-lemba-green transition">Roster</a>
            <a href="#" class="hover:text-lemba-green transition">Schedule</a>
            <a href="#" class="text-lemba-green font-bold border-b-2 border-lemba-green pb-1">League</a>
        </div>
    </div>

    <!-- Tabs Container -->
    <div class="bg-white border-b px-6 flex space-x-8 pt-4">
        <button id="tab-standings" class="pb-3 text-sm tracking-wide tab-active uppercase transition" onclick="switchTab('standings')">Standings</button>
        <button id="tab-stats" class="pb-3 text-sm tracking-wide tab-inactive uppercase transition" onclick="switchTab('stats')">Player Stats</button>
        <button id="tab-schedule" class="pb-3 text-sm tracking-wide tab-inactive uppercase transition" onclick="switchTab('schedule')">Schedule</button>
    </div>

    <!-- Main Content -->
    <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
        
        <!-- Standings Section -->
        <div id="section-standings" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden block">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 bg-white">
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider w-16 text-center">Pos</th>
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Club</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">MP</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">W</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">D</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">L</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center hidden sm:table-cell">GF</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center hidden sm:table-cell">GA</th>
                            <th class="py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">GD</th>
                            <th class="py-4 px-6 text-xs font-semibold text-black uppercase tracking-wider text-center">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body" class="text-sm">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Stats Section -->
        <div id="section-stats" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 bg-white">
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider w-16 text-center">Rank</th>
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Player</th>
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Team</th>
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Goals</th>
                            <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Assists</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body" class="text-sm">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Schedule Section -->
        <div id="section-schedule" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Sidebar: Week Selector -->
                <aside class="w-full lg:w-1/4">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sticky top-6">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Select Match Week</h3>
                        <div class="h-auto lg:h-[600px] overflow-y-auto pr-2 space-y-2 scrollbar-hide" id="week-selector">
                            <!-- Buttons injected via JS -->
                        </div>
                    </div>
                </aside>

                <!-- Matches View -->
                <section class="w-full lg:w-3/4">
                    <div class="mb-6 flex justify-between items-end">
                        <div>
                            <h3 id="current-week-title" class="text-2xl font-extrabold text-gray-900 uppercase">Match Week 1</h3>
                            <p id="current-week-dates" class="text-gray-500 font-medium mt-1">APR 1 - APR 5</p>
                        </div>
                        <div class="hidden sm:flex items-center space-x-2">
                            <span class="w-3 h-3 rounded-full bg-lemba-green inline-block"></span>
                            <span class="text-sm font-semibold text-gray-600">Lemba-Kongo Fixture</span>
                        </div>
                    </div>

                    <div id="matches-container" class="space-y-4">
                        <!-- Match Cards Injected via JS -->
                    </div>
                </section>
            </div>
        </div>

    </main>

    <script>
        // Data derived directly from match_data.json
        const standingsData = [

            { team: "Blessed FC", mp: 1, w: 1, d: 0, l: 0, gf: 5, ga: 0, isLA: false },

            { team: "DC Eagles SC", mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, isLA: false },

            { team: "Ellsworth AA SC", mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, isLA: false },
            { team: "Hidden Valley SC", mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, isLA: false },

            { team: "Tamarack Timbers", mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, isLA: false }
        ];

        // Extracted top performers from Lemba-Kongo's recent match results
        const playerStats = [
            { name: "Morgan Goma", team: "Lemba-Kongo Academy", goals: 0, assists: 0, isLA: true },
            { name: "Mohamed Ali", team: "Lemba-Kongo Academy", goals: 0, assists: 0, isLA: true },

            { name: "Martin Alvarez", team: "Lemba-Kongo Academy", goals: 0, assists: 0, isLA: true },
            { name: "Oshay Williams", team: "Lemba-Kongo Academy", goals: 0, assists: 0, isLA: true }
        ];

        // Process and sort standings
        const processedStandings = standingsData.map(team => {
            team.gd = team.gf - team.ga;
            team.pts = (team.w * 3) + (team.d * 1);
            return team;
        }).sort((a, b) => {
            if (b.pts !== a.pts) return b.pts - a.pts; // Sort by Points
            if (b.gd !== a.gd) return b.gd - a.gd;    // Sort by Goal Difference
            if (b.gf !== a.gf) return b.gf - a.gf;    // Sort by Goals For
            return a.team.localeCompare(b.team);      // Alphabetical fallback
        });

        // Sort stats
        const processedStats = playerStats.sort((a, b) => {
            if (b.goals !== a.goals) return b.goals - a.goals;
            return b.assists - a.assists;
        });

        function renderStandings() {
            const tbody = document.getElementById('standings-body');
            let html = '';
            
            processedStandings.forEach((team, index) => {
                const rowClass = "border-b border-gray-100 hover:bg-gray-50 transition";
                const textClass = team.isLA ? "font-bold text-black" : "font-medium text-gray-800";
                const bgClass = team.isLA ? "bg-lime-50" : "";
                
                html += `
                    <tr class="${rowClass} ${bgClass}">
                        <td class="py-4 px-6 text-center text-gray-500 font-medium">${index + 1}</td>
                        <td class="py-4 px-6 ${textClass} flex items-center space-x-3">
                            ${team.isLA ? `<div class="w-6 h-6 rounded-full bg-lemba-green text-black flex items-center justify-center text-[10px] font-bold">LK</div>` : `<div class="w-6 h-6 rounded-full bg-gray-200"></div>`}

                        </td>
                        <td class="py-4 px-4 text-center font-medium">${team.mp}</td>
                        <td class="py-4 px-4 text-center">${team.w}</td>
                        <td class="py-4 px-4 text-center">${team.d}</td>
                        <td class="py-4 px-4 text-center">${team.l}</td>
                        <td class="py-4 px-4 text-center text-gray-500 hidden sm:table-cell">${team.gf}</td>
                        <td class="py-4 px-4 text-center text-gray-500 hidden sm:table-cell">${team.ga}</td>
                        <td class="py-4 px-4 text-center font-medium ${team.gd > 0 ? 'text-green-600' : (team.gd < 0 ? 'text-red-500' : 'text-gray-500')}">${team.gd > 0 ? '+'+team.gd : team.gd}</td>
                        <td class="py-4 px-6 text-center font-bold text-black text-base">${team.pts}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function renderStats() {
            const tbody = document.getElementById('stats-body');
            let html = '';
            
            processedStats.forEach((player, index) => {
                html += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                        <td class="py-4 px-6 text-center text-gray-500 font-medium">${index + 1}</td>
                        <td class="py-4 px-6 font-bold text-black">${player.name}</td>
                        <td class="py-4 px-6 text-gray-600 flex items-center space-x-2">
                            <div class="w-4 h-4 rounded-full bg-lemba-green"></div>
                            <span>${player.team}</span>
                        </td>
                        <td class="py-4 px-6 text-center font-bold text-lg">${player.goals}</td>
                        <td class="py-4 px-6 text-center text-gray-500">${player.assists}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Mock Schedule Data for the Master Schedule Tab
        const mockScheduleData = {
            "weeks": [
                {
                    "week": 1, "dates": "APR 1 - APR 5",
                    "matches": [
                        { "date": "APR 1", "home": "Ellsworth AA SC", "away": "Lemba-Kongo Academy", "location": "Raptor Stadium, Rockville, MD", "time": "12:30 PM" },

                    ]

                    "matches": [

                        { "date": "APR 11", "home": "Hidden Valley SC", "away": "Lions United Academy", "location": "Bethesda, MD", "time": "12:00 PM" },

                    ]
                },

                    "week": 4, "dates": "APR 12 - APR 25",
                    "matches": [
                        { "date": "APR 12", "home": "Lemba-Kongo Academy", "away": "Hidden Valley SC", "location": "Academy Grounds, Colesville, MD", "time": "12:30 PM" },

                    ]

        };

        let scheduleData = [];
        let currentActiveWeek = 1;

        async function initSchedule() {
            try {
                const response = await fetch('league_schedule.json');
                if (!response.ok) throw new Error("Local fetch blocked");
                const data = await response.json();
                scheduleData = data.weeks;
            } catch (err) {
                console.warn("Using fallback data due to preview constraints.");
                scheduleData = mockScheduleData.weeks;
                for(let i=7; i<=20; i++) {
                    scheduleData.push({
                        week: i, dates: `WEEK ${i} TBD`,
                        matches: [
                            { date: "TBD", home: "Lemba-Kongo Academy", away: "TBD Opponent", location: "Academy Grounds, Colesville, MD", time: "TBD" },
                            { date: "TBD", home: "DC Eagles SC", away: "Ellsworth AA SC", location: "Washington, DC", time: "TBD" }
                        ]
                    });
                }
            }

            renderWeekSelector();
            renderMatches(1);
        }

        function renderWeekSelector() {
            const container = document.getElementById('week-selector');
            container.innerHTML = '';
            
            scheduleData.forEach(weekObj => {
                const btn = document.createElement('button');
                const isActive = weekObj.week === currentActiveWeek;
                
                btn.className = `w-full text-left px-4 py-3 rounded-lg font-bold text-sm transition flex justify-between items-center ${isActive ? 'bg-lemba-black text-lemba-green' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`;
                btn.innerHTML = `
                    <span>Week ${weekObj.week}</span>
                    <span class="text-xs ${isActive ? 'text-gray-400' : 'text-gray-400'} font-medium">11 Teams</span>
                `;
                btn.onclick = () => {
                    currentActiveWeek = weekObj.week;
                    renderWeekSelector();
                    renderMatches(weekObj.week);
                };
                container.appendChild(btn);
            });
        }

        function renderMatches(weekNum) {
            const weekObj = scheduleData.find(w => w.week === weekNum);
            if (!weekObj) return;

            document.getElementById('current-week-title').innerText = `Match Week ${weekObj.week}`;
            document.getElementById('current-week-dates').innerText = weekObj.dates;

            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            weekObj.matches.forEach(match => {
                const isLemba = match.home === "Lemba-Kongo Academy" || match.away === "Lemba-Kongo Academy";
                
                const borderClass = isLemba ? 'border-2 border-lemba-green bg-lime-50/20' : 'border border-gray-200 bg-white';
                
                const card = document.createElement('div');
                card.className = `${borderClass} rounded-xl shadow-sm p-5 hover:shadow-md transition flex flex-col sm:flex-row sm:items-center justify-between gap-4`;
                
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center space-x-2 text-sm text-gray-500 font-bold mb-3 uppercase tracking-wider">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>

                        </div>
                        
                        <div class="flex flex-col space-y-2">
                            <div class="flex items-center justify-between sm:justify-start sm:space-x-4">
                                <span class="text-lg font-extrabold text-gray-900 w-48 truncate ${match.home === 'Lemba-Kongo Academy' ? 'text-lemba-green bg-lemba-black px-2 py-0.5 rounded' : ''}">${match.home}</span>
                                <span class="text-xs font-bold text-gray-400 px-2 uppercase">VS</span>
                                <span class="text-lg font-extrabold text-gray-900 w-48 truncate ${match.away === 'Lemba-Kongo Academy' ? 'text-lemba-green bg-lemba-black px-2 py-0.5 rounded' : ''}">${match.away}</span>
                            </div>
                        </div>
                    </div>

                    <div class="sm:border-l sm:border-gray-200 sm:pl-6 flex flex-col sm:items-end justify-center">
                        <div class="flex items-center text-sm text-gray-600 font-medium bg-gray-100 px-3 py-1.5 rounded-full">
                            <svg class="w-4 h-4 mr-1.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            ${match.location}
                        </div>
                        ${isLemba ? '<div class="mt-2 text-xs font-bold text-lemba-green bg-lemba-black px-2 py-1 rounded inline-block">Official Match</div>' : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderStats() {
            const tbody = document.getElementById('stats-body');
            let html = '';
            
            processedStats.forEach((player, index) => {
                html += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                        <td class="py-4 px-6 text-center text-gray-500 font-medium">${index + 1}</td>
                        <td class="py-4 px-6 font-bold text-black">${player.name}</td>
                        <td class="py-4 px-6 text-gray-600 flex items-center space-x-2">
                            <div class="w-4 h-4 rounded-full bg-lemba-green"></div>
                            <span>${player.team}</span>
                        </td>
                        <td class="py-4 px-6 text-center font-bold text-lg">${player.goals}</td>
                        <td class="py-4 px-6 text-center text-gray-500">${player.assists}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function switchTab(tabId) {
            // Update Tab Styling
            document.getElementById('tab-standings').className = tabId === 'standings' ? 'pb-3 text-sm tracking-wide tab-active uppercase transition' : 'pb-3 text-sm tracking-wide tab-inactive uppercase transition';
            document.getElementById('tab-stats').className = tabId === 'stats' ? 'pb-3 text-sm tracking-wide tab-active uppercase transition' : 'pb-3 text-sm tracking-wide tab-inactive uppercase transition';
            document.getElementById('tab-schedule').className = tabId === 'schedule' ? 'pb-3 text-sm tracking-wide tab-active uppercase transition' : 'pb-3 text-sm tracking-wide tab-inactive uppercase transition';
            
            // Update Section Visibility
            document.getElementById('section-standings').classList.toggle('hidden', tabId !== 'standings');
            document.getElementById('section-stats').classList.toggle('hidden', tabId !== 'stats');
            document.getElementById('section-schedule').classList.toggle('hidden', tabId !== 'schedule');
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderStandings();
            renderStats();
            initSchedule();
        });
    </script>
</body>
</html>
