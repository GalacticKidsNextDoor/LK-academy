      function showTime(){
          var date = new Date();
          var h = date.getHours(); // 0 - 23
          var m = date.getMinutes(); // 0 - 59
          var s = date.getSeconds(); // 0 - 59
          var session = "AM";

          if(h == 0){
              h = 12;
          }

          if(h > 12){
              h = h - 12;
              session = "PM";
          }

          h = (h < 10) ? "0" + h : h;
          m = (m < 10) ? "0" + m : m;
          s = (s < 10) ? "0" + s : s;

          var time = h + ":" + m + ":" + s + " " + session;
          document.getElementById("MyClockDisplay").innerText = time;
          document.getElementById("MyClockDisplay").textContent = time;

          setTimeout(showTime, 1000);

      }

      function showCalendar(){

      function hideCalendar(){
        //hide the showCalendar and...
        document.getElementById("fashion-calendar-container").style.opacity = 0;

        setTimeout(function(){

        }, 500);

        //...reset the state of the Fashion object-subject to reflect the return to baseline
        Fashion.calendar.open = false;

      }

      function toggleFashionCalendar(){
        if(Fashion.calendar.open){
          hideCalendar();
          return true;
        }
        showCalendar();

      function hideDay(dayToHide){
        if(dayToHide===-1){
          document.getElementById(`day-default-container`).setAttribute("visible", false);
        }
        else{
          document.getElementById(`day-${dayToHide}-container`).setAttribute("visible", false);
        }
      }

      function showDay(dayToShow){
        if(dayToShow===-1){
          //do nothing
        }
        else{
          document.getElementById(`day-${dayToShow}-container`).setAttribute("visible", true);
          Fashion.calendar.dayInView = dayToShow;
        }
      }

      function toggleDayInView(dayNumber){
        let currentDay = Fashion.calendar.dayInView;
        console.log(`toggle day ${dayNumber} in view`);

        if(currentDay!=dayNumber){
          hideDay(currentDay);
          showDay(dayNumber);
        }
      }
