<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lemba Academy</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Professional Dark Mode Aesthetic */
        .portal-bg { background-color: #111827; }
        .card-bg { background-color: #1F2937; }
        .accent-color { color: #84cc16; } /* Lime green for a vibrant, professional look */
        .progress-bar-bg { background-color: #374151; }
        .progress-fill { transition: width 0.5s ease-in-out; }
        /* Style for the Static Data Message */
        #status-message {
            background-color: #042f2e; /* Dark teal/green background */
            border: 1px solid #14b8a6;
            color: #5eead4; /* Lighter teal text color */
        }
    </style>
    <script type="module">
        
        let currentRoster = [];
        const ROSTER_JSON_PATH = 'academy_roster.json'; // Path to the static JSON file

        // --- CORE APPLICATION STATE & UI ELEMENTS ---
        const playerListEl = document.getElementById('player-list');
        const playerDetailEl = document.getElementById('player-detail');
        const loaderEl = document.getElementById('loader');
        const statusMessageEl = document.getElementById('status-message');
        const authMessageEl = document.getElementById('auth-message');
        
        // --- 1. DATA LOADING (From JSON File) ---
        const loadRosterData = async () => {
            try {
                const response = await fetch(ROSTER_JSON_PATH);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                currentRoster = data.roster || [];
                
                authMessageEl.textContent = 'Data Source: Static JSON File';
                statusMessageEl.textContent = 'Roster data loaded successfully.';

                // Render the UI after loading
                renderRosterList(currentRoster);
                const momo = currentRoster.find(p => p.name.includes('Momo'));
                selectPlayer(momo || currentRoster[0]);

            } catch (error) {
                console.error("Error loading roster data:", error);
                authMessageEl.textContent = 'Data Source: Error (Offline)';
                statusMessageEl.textContent = `FATAL ERROR: Could not load data from ${ROSTER_JSON_PATH}. Check file existence and path.`;
            } finally {
                loaderEl.classList.add('hidden');
            }
        };

        // --- 2. UI RENDERING ---

        const calculateProgress = (last, target) => {
            if (target === 0 || last === 0) return '0%';
            const percent = Math.min(100, (last / target) * 100);
            return `${(last / target) * 100 > 100 ? '100+' : ((last / target) * 100).toFixed(0)}%`;
        };
        
        const renderMetricGroup = (metrics, type) => {
            return metrics
                .filter(metric => metric.type === type)
                .map(metric => {
                    const progress = calculateProgress(metric.last, metric.target);
                    const isComplete = parseFloat(progress) >= 100;

                    return `
                        <div class="mb-4 p-4 border border-gray-600 rounded-xl card-bg">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-gray-200 font-semibold">${metric.name}</span>
                                <span class="text-sm ${isComplete ? 'text-lime-400 font-bold' : 'text-gray-400'}">${metric.last} / ${metric.target} ${metric.unit}</span>
                            </div>
                            <div class="progress-bar-bg h-2 rounded-full mb-2">
                                <div class="progress-fill h-full rounded-full ${isComplete ? 'bg-lime-500' : 'bg-orange-500'}" style="width: ${progress};"></div>
                            </div>
                            <span class="text-xs text-gray-400">${progress} completed</span>
                        </div>
                    `;
                }).join('');
        };


        const renderRosterList = (roster) => {
            playerListEl.innerHTML = '';
            roster.forEach(player => {
                const li = document.createElement('li');
                li.className = 'p-3 my-1 rounded-lg cursor-pointer bg-gray-700 hover:bg-gray-600 transition duration-150 ease-in-out border border-transparent';
                li.id = `player-item-${player.id}`;
                li.innerHTML = `
                    <div class="font-bold text-white">${player.name}</div>
                    <div class="text-sm text-gray-400">${player.position} (${player.status})</div>
                `;
                li.onclick = () => selectPlayer(player);
                playerListEl.appendChild(li);
            });
        };
        
        const selectPlayer = (player) => {
            if (!player) {
                playerDetailEl.innerHTML = '<p class="text-gray-400 p-8 text-center">Select a player from the roster.</p>';
                return;
            }

            // Highlight selected player in the list
            document.querySelectorAll('#player-list li').forEach(el => {
                el.classList.remove('bg-lime-600', 'hover:bg-lime-500');
                el.classList.add('bg-gray-700', 'hover:bg-gray-600');
            });
            const selectedEl = document.getElementById(`player-item-${player.id}`);
            if (selectedEl) {
                selectedEl.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                selectedEl.classList.add('bg-lime-600', 'hover:bg-lime-500');
            }
            
            // Render metrics in their respective sections
            const combineMetricsHtml = renderMetricGroup(player.metrics, 'combine');
            const matchMetricsHtml = renderMetricGroup(player.metrics, 'match');


            playerDetailEl.innerHTML = `
                <div class="p-6">
                    <h2 class="text-3xl font-extrabold accent-color mb-1">${player.name}</h2>
                    <p class="text-lg text-gray-300 mb-4">${player.position} | Age: ${player.age} | ${player.height}, ${player.weight}</p>
                    
                    <div class="mb-6 card-bg p-4 rounded-xl shadow-lg">
                        <p class="text-sm font-semibold text-gray-400 mb-2">Current Status & Notes</p>
                        <p class="text-gray-200">${player.status}</p>
                        <p class="text-gray-300 italic text-sm mt-2">${player.notes}</p>
                    </div>

                    <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">Combine & Development Metrics</h3>
                    ${combineMetricsHtml}

                    <h3 class="text-xl font-bold text-white mt-8 mb-4 border-b border-gray-700 pb-2">Match Metrics (Season Targets)</h3>
                    ${matchMetricsHtml}
                </div>
            `;
        };
        
        // Start the application
        window.onload = loadRosterData;
    </script>
</head>
<body class="portal-bg min-h-screen text-gray-100">

    <div id="loader" class="fixed inset-0 portal-bg flex flex-col justify-center items-center z-50">
        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-lime-500"></div>
        <p class="mt-4 text-lime-400">Loading Roster Data...</p>
    </div>

    <div class="max-w-7xl mx-auto p-4 sm:p-8">
        <header class="flex justify-between items-center pb-4 border-b border-gray-700 mb-6">
            <h1 class="text-4xl font-extrabold text-white tracking-tight">The Lemba Academy</h1>
            <div class="text-right">
                <p id="auth-message" class="text-sm text-gray-400">Data Source: Static JSON File</p>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Roster List (Left Column) -->
            <div class="lg:col-span-1 card-bg rounded-2xl shadow-xl overflow-hidden">
                <div class="p-4 border-b border-gray-700">
                    <h2 class="text-xl font-bold text-white">Active Roster</h2>
                </div>
                <ul id="player-list" class="divide-y divide-gray-700 p-2">
                    <!-- Player list items will be injected here -->
                </ul>
            </div>

            <!-- Player Detail (Right Column) -->
            <div class="lg:col-span-3 card-bg rounded-2xl shadow-xl min-h-[60vh]">
                <div id="player-detail">
                    <p class="text-gray-400 p-8 text-center">Select a player from the roster to view their profile and metrics.</p>
                </div>
            </div>
        </main>
        
        <!-- Global Status/Warning Message -->
        <footer class="mt-8 text-center text-sm p-3 rounded-lg" id="footer-status">
            <p id="status-message" class="font-semibold">Roster loaded successfully.</p>
            <p class="text-gray-400 mt-2">Note: This portal is read-only and uses static data from the `academy_roster.json` file.</p>
        </footer>
    </div>
</body>
</html>
