<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LEMBA | KOLLEKTION | 86</title>
    <link rel="stylesheet" href="./css/browse.css" type="text/css" />
    <script src="./js/aframe1.3.0.min.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js.map"></script><!---->
    <script src="https://cdn.jsdelivr.net/npm/lazyload@2.0.0-rc.2/lazyload.js"></script>
    <script src="./js/lk-dia-navigation.js"></script><!---->
    <script src="./js/lk-dia-collection.js"></script>
    <script>
      function loadItems(){
        let collectionContainer = document.getElementById("collection-container");
        collectionContainer.innerHTML = "";

        for(let itemCount = 0; itemCount < Collection.list.length; itemCount++){
          let currentItem = itemCount;
          (function(){
            let currentButton = document.createElement("img");
            currentButton.classList.add("collection-item-container");
            currentButton.setAttribute("id",`collection-item-${currentItem}-container`);
            currentButton.setAttribute("type", "button");

            if(Collection.list[currentItem].bg.icon!=null){
              //currentButton.style.backgroundImage = `url(${Collection.list[currentItem].bg.icon})`;
              if(currentItem<10){
                currentButton.setAttribute("src", Collection.list[currentItem].bg.icon);
              }
              else{
                currentButton.setAttribute("data-src", Collection.list[currentItem].bg.icon);
                currentButton.classList.add("lazyload");
              }
            }
            if(Collection.list[currentItem].bg.size!=null){
              //currentButton.style.backgroundSize = Collection.list[currentItem].bg.size;
              currentButton.style.objectFit = "contain";
            }
            if(Collection.list[currentItem].bg.repeat!=null){
              currentButton.style.backgroundRepeat = Collection.list[currentItem].bg.repeat;
            }
            if(Collection.list[currentItem].bg.position!=null){
              currentButton.style.backgroundPosition = Collection.list[currentItem].bg.position;
            }
            currentButton.style.backgroundColor = Collection.list[currentItem].bg.color;

            collectionContainer.append(currentButton);

            currentButton.addEventListener("click", function(){
              openItemPreview(currentItem);
            });

            if(currentItem==Collection.list.length-1)lazyload();
          })();
          /*{
            type: "headwear",
            articleName: "",
            yearProduced: "",
            articlePrice: "",
            articleIcon: ""
          }*/
        }
      }

      var itemPreviewVisible = false;
      var currentPreviewInFocus = -1;

      function openItemPreview(itemNumber){
        /*if(itemPreviewVisible){
          console.log("item preview already open");
        }
        else{*/
          document.getElementById("item-preview-container").style.display = "block";
          document.getElementById("name-item-preview-container").textContent = Collection.list[itemNumber].articleName;
          document.getElementById("price-item-preview-container").textContent = Collection.list[itemNumber].articlePrice;
          document.getElementById("description-item-preview-container").textContent = Collection.list[itemNumber].articleDesc;
          itemPreviewVisible = true;
          currentPreviewInFocus = itemNumber;
      //  }
      }

      function closeItemPreview(){
        if(itemPreviewVisible){
          document.getElementById("item-preview-container").style.display = "none";
          document.getElementById("name-item-preview-container").textContent = "";
          document.getElementById("price-item-preview-container").textContent = "";
          document.getElementById("description-item-preview-container").textContent = "";
          itemPreviewVisible = false;
          currentPreviewInFocus = -1;
        }
        else{
          console.log("item preview already hidden");
        }
      }

      function toggleItemPreview(itemNumber){
        if(itemPreviewVisible){
          closeItemPreview();
        }
        else{
          openItemPreview(itemNumber);
        }
      }

      var memberCart = [];

      document.addEventListener("DOMContentLoaded", function(){
        initScene();

        setTimeout(function(){
          loadItems();
        }, 5000);

        document.getElementById("close-item-preview-button-container").addEventListener("click", function(){
          closeItemPreview();
        });

        document.getElementById("add-item-to-cart-button-container").addEventListener("click", function(){
          if(itemPreviewVisible){
            console.log("preview in focus: ", currentPreviewInFocus);
            memberCart.push(Collection.list[currentPreviewInFocus]);
            console.log("updated cart");
            console.log(memberCart);
            document.getElementById("item-added-to-cart-overlay-container").style.display = "block";

            setTimeout(function(){
              document.getElementById("item-added-to-cart-overlay-container").style.opacity = 1.0;
            }, 50);

            document.getElementById("item-added-icon-container").style.backgroundImage = `url(${Collection.list[currentPreviewInFocus].bg.icon})`;
            document.getElementById("item-added-quantity-container").textContent = Collection.list[currentPreviewInFocus].articleName+" 1";
            document.getElementById("item-added-description-container").textContent = Collection.list[currentPreviewInFocus].articleDesc;

            setTimeout(function(){
              document.getElementById("item-added-to-cart-overlay-container").style.opacity = 0;
            }, 4400);

            setTimeout(function(){
              document.getElementById("item-added-to-cart-overlay-container").style.display = "none";
            }, 5000);
          }
          else{
            console.log("there is no preview in focus!");
          }
        })
      });
    </script>
  </head>
<body>
  <div id="site-title-container">
    <div id="title-name-container">Lemba - Kongo</div>
    <input id="toggle-mobile-menu-container" type="button" value="" />
  </div>
  <div id="item-added-to-cart-overlay-container">
    <h3 style="width: 90%; height: 50px; line-height: 50px; text-transform: uppercase; font-family: monospace; padding-left: 10%; letter-spacing: 1px;">Added to Cart!</h3>
    <div id="item-added-icon-container"></div>
    <div id="item-added-quantity-container">
      1
    </div>
    <div id="item-added-description-container">
      Description Goes Here
    </div>
  </div>
  <div id="main-menu-container">
    <input id="boutique-button-container" class="menu-option-button-container" value="Boutique" type="button"/>
    <input id="maison-button-container" class="menu-option-button-container" value="Maison" type="button"/>
    <input id="contact-button-container" class="menu-option-button-container" value="Contact" type="button"/>
  </div>
  <div id="collection-container">
    <div id="collection-item-placeholder-container" class="collection-item-container">

    </div>
  </div>
  <div id="item-preview-container">
    <div id="name-item-preview-container"></div>
    <div id="price-item-preview-container"></div>
    <div id="description-item-preview-container"></div>
    <input type="button" value="add to cart" id="add-item-to-cart-button-container" />
    <input type="button" value="x" id="close-item-preview-button-container" />
  </div>
</body>
</html>
